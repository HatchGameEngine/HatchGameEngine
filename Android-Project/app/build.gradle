apply plugin: 'com.android.application'

android {
    namespace 'vg.aurum.HatchGameEngine'

    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "vg.aurum.HatchGameEngine"
        minSdk 26
        targetSdk 33
        versionName "1.4.0"
        ndk.abiFilters 'arm64-v8a', 'armeabi-v7a'
        externalNativeBuild {
            cmake {
                arguments = ["-DANDROID_STL=c++_shared"]
            }
        }
    }

    buildTypes {
        release {
            debuggable true
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // TODO: Add release signing key
            signingConfig signingConfigs.debug
        }
        debug {
            debuggable true
        }
    }

    externalNativeBuild {
        cmake {
            path file('../../CMakeLists.txt')
        }
    }
    buildFeatures {
        viewBinding true
        buildConfig true
    }

    // Prevent compression for .hatch files for faster IO
    androidResources {
        noCompress += ["hatch"]
    }
}

dependencies {
    implementation 'androidx.core:core:1.17.0'
}